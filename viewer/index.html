<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <title>Dorado Viewer Test v2</title>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <style>
            :root {
                color-scheme: dark;
            }

            body {
                font-family: Arial, sans-serif;
                margin: 24px;
                background: #111;
                color: #eee;
            }

            h1 {
                margin-top: 0;
                margin-bottom: 8px;
            }

            .badge {
                display: inline-block;
                margin-bottom: 20px;
                padding: 6px 10px;
                border: 1px solid #2d6cdf;
                border-radius: 999px;
                color: #9fc0ff;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            .row {
                margin-bottom: 12px;
            }

            label {
                display: inline-block;
                width: 90px;
            }

            input {
                width: 220px;
                padding: 6px;
                margin-right: 8px;
            }

            button {
                padding: 8px 12px;
                margin-right: 8px;
                margin-bottom: 8px;
                cursor: pointer;
            }

            #log {
                margin-top: 16px;
                padding: 12px;
                background: #1b1b1b;
                border: 1px solid #333;
                min-height: 220px;
                white-space: pre-wrap;
            }

            .ok {
                color: #7cfc98;
            }

            .err {
                color: #ff7b7b;
            }
        </style>
    </head>

    <body>
        <h1>Dorado Viewer Test</h1>
        <div class="badge">HTTPS / WSS version</div>

        <div class="row">
            <label for="host">Host</label>
            <input id="host" value="10.31.29.85">
        </div>

        <div class="row">
            <label for="port">Port</label>
            <input id="port" value="5005">
        </div>

        <div class="row">
            <button id="httpBtn">Test HTTPS</button>
            <button id="wsConnectBtn">Connect WSS</button>
            <button id="wsSendBtn">Send WSS</button>
            <button id="wsCloseBtn">Close WSS</button>
            <button id="clearBtn">Clear</button>
        </div>

        <div id="log"></div>

        <script>
            let socket = null;

            const hostInput = document.getElementById("host");
            const portInput = document.getElementById("port");
            const logEl = document.getElementById("log");

            document.getElementById("httpBtn").addEventListener("click", testHttp);
            document.getElementById("wsConnectBtn").addEventListener("click", connectWs);
            document.getElementById("wsSendBtn").addEventListener("click", sendWs);
            document.getElementById("wsCloseBtn").addEventListener("click", closeWs);
            document.getElementById("clearBtn").addEventListener("click", clearLog);

            function getHttpsBaseUrl() {
                const host = hostInput.value.trim();
                const port = portInput.value.trim();
                return `https://${host}:${port}`;
            }

            function getWssUrl() {
                const host = hostInput.value.trim();
                const port = portInput.value.trim();
                return `wss://${host}:${port}/ws`;
            }

            async function testHttp() {
                const url = `${getHttpsBaseUrl()}/api/ping`;
                log(`HTTPS request: ${url}`);

                try {
                    const response = await fetch(url, {
                        method: "GET"
                    });

                    const text = await response.text();
                    log(`HTTPS status: ${response.status}`, "ok");
                    log(`HTTPS body: ${text}`, "ok");
                } catch (error) {
                    log(`HTTPS error: ${error.message}`, "err");
                }
            }

            function connectWs() {
                const url = getWssUrl();
                log(`WSS connect: ${url}`);

                try {
                    socket = new WebSocket(url);

                    socket.addEventListener("open", () => {
                        log("WSS open", "ok");
                    });

                    socket.addEventListener("message", event => {
                        log(`WSS message: ${event.data}`, "ok");
                    });

                    socket.addEventListener("close", event => {
                        log(`WSS close: code=${event.code} reason=${event.reason || "none"}`);
                    });

                    socket.addEventListener("error", () => {
                        log("WSS error", "err");
                    });
                } catch (error) {
                    log(`WSS exception: ${error.message}`, "err");
                }
            }

            function sendWs() {
                if (!socket || socket.readyState !== WebSocket.OPEN) {
                    log("WSS not connected", "err");
                    return;
                }

                const payload = `hello ${new Date().toISOString()}`;
                socket.send(payload);
                log(`WSS sent: ${payload}`);
            }

            function closeWs() {
                if (!socket) {
                    log("WSS not initialized");
                    return;
                }

                socket.close(1000, "Client closing");
            }

            function clearLog() {
                logEl.textContent = "";
            }

            function log(message, cssClass = "") {
                const line = document.createElement("div");
                line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;

                if (cssClass) {
                    line.className = cssClass;
                }

                logEl.appendChild(line);
            }
        </script>
    </body>

</html>
